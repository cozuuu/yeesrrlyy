<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Little World</title>

<style>
body{
  margin:0;
  background:#1f1412;
  color:#F5F1E8;
  font-family: Georgia, serif;
}

.container{
  max-width:900px;
  margin:auto;
  padding:80px 20px;
  text-align:center;
}

h1{
  font-size:2.6rem;
  margin-bottom:10px;
}

.subtitle{
  opacity:0.7;
  margin-bottom:60px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
}

.photo{
  height:180px;
  background:#6D4C41;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#C9A227;
  cursor:pointer;
  transition:0.3s;
}

.photo:hover{
  transform:scale(1.05);
  background:#7a564c;
}

/* popup */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}

.popup-content{
  max-width:500px;
  text-align:center;
  background:#2b1b18;
  padding:30px;
  border-radius:12px;
}

.close{
  margin-top:20px;
  cursor:pointer;
  color:#C9A227;
}
</style>
</head>

<body>

<div class="container">
  <h1>Our Little World</h1>
  <div class="subtitle">Every picture has a memory behind it.</div>

  <div class="grid">

    <div class="photo" onclick="openPopup('Memory 1: write here')">1</div>
    <div class="photo" onclick="openPopup('Memory 2: write here')">2</div>
    <div class="photo" onclick="openPopup('Memory 3: write here')">3</div>
    <div class="photo" onclick="openPopup('Memory 4: write here')">4</div>

  </div>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <p id="popupText"></p>
    <div class="close" onclick="closePopup()">Close</div>
  </div>
</div>

<script>
function openPopup(text){
  document.getElementById("popupText").innerText = text;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
